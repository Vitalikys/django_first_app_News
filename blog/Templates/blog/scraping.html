{% extends 'base.html' %}

{% block title %}
    Add news Scraping
{% endblock %}


{% block card_news_container %}
    <h4>Add news from site portal.lviv.ua </h4>
    <form method="post" action="{% url 'scraping' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-success">try scraping)</button>
    </form>

{#    # show errors  #}
    {% if message %}
        <h5>Errors of scraping:</h5>
        <span style="color: red">{{ message }}</span>
    {% endif %}
{% endblock %}
