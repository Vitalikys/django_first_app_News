{% extends 'base.html' %}

{% block title %} {{ news_item.title }}{% endblock %}

{% block card_news_container %}
    <h1> {{ news_item.title }} </h1>
    <p>{{ news_item.content |linebreaksbr }}</p>
    {% if news_item.photo %}
        <img src="{{ news_item.photo.url }}" title="{{ news_item.photo.url }}" alt="{{ news_item.photo.url }}"
             width="350" class="mr-3 col-md-5">
    {% else %}
        <img src="https://picsum.photos/id/1011/350/235" title="default_photo" alt="фото заглушка"
             width="350" class="col-md-5 mr-3">
    {% endif %}


{% endblock %}
